version: '3.9'

services:

  # ─── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: boat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-boatdb}
      POSTGRES_USER: ${DB_USER:-boatuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-boatpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-boatuser} -d ${DB_NAME:-boatdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - boat-network

  # ─── Keycloak ─────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: boat-keycloak
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
      - >-
        mkdir -p /opt/keycloak/data/import &&
        sed
        -e 's|__KC_BOATUSER_PASSWORD__|${KC_BOATUSER_PASSWORD}|g'
        -e 's|__KC_BOATADMIN_PASSWORD__|${KC_BOATADMIN_PASSWORD}|g'
        /tmp/realm-export.json.template
        > /opt/keycloak/data/import/realm-export.json &&
        /opt/keycloak/bin/kc.sh start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-boatdb}
      KC_DB_USERNAME: ${DB_USER:-boatuser}
      KC_DB_PASSWORD: ${DB_PASSWORD:-boatpassword}
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
      KC_HEALTH_ENABLED: "true"
      KC_BOATUSER_PASSWORD: ${KC_BOATUSER_PASSWORD}
      KC_BOATADMIN_PASSWORD: ${KC_BOATADMIN_PASSWORD}
    volumes:
      - ./keycloak/realm-export.json.template:/tmp/realm-export.json.template:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c 'exec 3<>/dev/tcp/localhost/8080 && printf \"GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && head -1 <&3 | grep -q 200' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - boat-network

  # ─── Backend ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: boat-backend
    restart: unless-stopped
    environment:
      SERVER_PORT: 8081
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-boatdb}
      DB_USER: ${DB_USER:-boatuser}
      DB_PASSWORD: ${DB_PASSWORD:-boatpassword}
      KEYCLOAK_ISSUER_URI: http://localhost:8080/realms/${KEYCLOAK_REALM:-boat-realm}
      KEYCLOAK_JWK_URI: http://keycloak:8080/realms/${KEYCLOAK_REALM:-boat-realm}/protocol/openid-connect/certs
      KEYCLOAK_AUTH_URL: http://localhost:8080/realms/${KEYCLOAK_REALM:-boat-realm}/protocol/openid-connect/auth
      KEYCLOAK_TOKEN_URL: http://localhost:8080/realms/${KEYCLOAK_REALM:-boat-realm}/protocol/openid-connect/token
      CORS_ALLOWED_ORIGINS: http://localhost:4200,http://localhost:80,http://frontend
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - boat-network

  # ─── Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: boat-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - boat-network

networks:
  boat-network:
    driver: bridge

volumes:
  postgres_data:
