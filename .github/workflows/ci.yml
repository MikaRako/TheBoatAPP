name: CI

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  # ─── Backend ────────────────────────────────────────────────────
  backend:
    name: Backend – Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # Testcontainers spins up a real PostgreSQL container during tests.
      # Docker is available on ubuntu-latest runners by default.
      - name: Build and run tests
        working-directory: backend
        run: mvn --batch-mode --no-transfer-progress verify

      - name: Upload Surefire test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: backend/target/surefire-reports/
          retention-days: 7

  # ─── Frontend ───────────────────────────────────────────────────
  frontend:
    name: Frontend – Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # Karma requires a browser; ChromeHeadless is pre-installed on ubuntu-latest.
      - name: Run unit tests (headless Chrome)
        working-directory: frontend
        run: npm test -- --watch=false

      - name: Build production bundle
        working-directory: frontend
        run: npm run build:prod

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ─── Docker image build ─────────────────────────────────────────
  docker:
    name: Docker – Build Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: boat-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: boat-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
