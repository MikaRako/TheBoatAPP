spring:
  application:
    name: boat-management

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:boatdb}
    username: ${DB_USER:boatuser}
    password: ${DB_PASSWORD:boatpassword}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/boat-realm}
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8080/realms/boat-realm/protocol/openid-connect/certs}

server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    oauth2-redirect-url: ${SWAGGER_OAUTH2_REDIRECT:http://localhost:8081/swagger-ui/oauth2-redirect.html}
  oAuthFlow:
    authorizationUrl: ${KEYCLOAK_AUTH_URL:http://localhost:8080/realms/boat-realm/protocol/openid-connect/auth}
    tokenUrl: ${KEYCLOAK_TOKEN_URL:http://localhost:8080/realms/boat-realm/protocol/openid-connect/token}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [boat-backend] [%X{user}] %logger{36} - %msg%n"
  level:
    com.boatmanagement: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
